# Postgres is EXTERNAL (94.74.115.204) — not run here.
# Two services share one image: the control API (always on) and the worker
# (run on demand or via the host scheduler / cron).
services:
  api:
    build: .
    image: api-scraper:latest
    env_file: .env
    environment:
      PORT: 8080         # container listens on 8080; host maps it below
    ports:
      - "8137:8080"     # host 8137 (8080 is used by the So Scraping frontend)
    restart: unless-stopped
    command: ["node", "src/api/server.js"]

  worker:
    build: .
    image: api-scraper:latest
    env_file: .env
    restart: "no"
    profiles: ["manual"]        # `docker compose run --rm worker`
    command: ["node", "src/worker.js"]

  # Unified work_queue runner pool (scrape jobs). One container = one slot; scale
  # with `docker compose up -d --scale runner=4`. Runs Chromium HEADFUL under Xvfb
  # (JobBKK's bot-check needs a real browser). The per-connector DB lock keeps an
  # account to one job at a time, so several runners parallelise across accounts.
  runner:
    build: .
    image: api-scraper:latest
    env_file: .env
    restart: unless-stopped
    command: ["xvfb-run", "-a", "node", "workers/runner.js"]

  migrate:
    build: .
    image: api-scraper:latest
    env_file: .env
    restart: "no"
    profiles: ["manual"]        # `docker compose run --rm migrate`
    command: ["node", "src/db/migrate.js"]
